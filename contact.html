<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>联系 · Jiale</title>
    <style>
      :root {
        --bg: #f6f8fb;
        --surface: #ffffff;
        --text-main: #1f2328;
        --text-sub: #57606a;
        --line: #d0d7de;
        --primary: #0969da;
        --primary-soft: #ddf4ff;
        --radius: 14px;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0d1117;
          --surface: #161b22;
          --text-main: #e6edf3;
          --text-sub: #9da7b3;
          --line: #30363d;
          --primary: #58a6ff;
          --primary-soft: #0c2d6b;
        }
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
        background: var(--bg);
        color: var(--text-main);
      }
      .container { width: min(1180px, 94vw); margin: 0 auto; }
      .topbar {
        position: sticky;
        top: 0;
        backdrop-filter: blur(10px);
        background: color-mix(in srgb, var(--bg) 90%, transparent);
        border-bottom: 1px solid var(--line);
      }
      .topbar-inner {
        height: 62px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .brand { font-weight: 700; }
      .nav { display: flex; gap: 12px; }
      .nav a {
        text-decoration: none;
        color: var(--text-sub);
        padding: 8px 12px;
        border-radius: 999px;
      }
      .nav a.active,
      .nav a:hover { background: var(--primary-soft); color: var(--primary); }
      .main { padding: 56px 0; }
      .layout {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
      }
      .card {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        padding: 22px;
      }
      h1, h2 { margin: 0 0 10px; }
      p { margin: 0; color: var(--text-sub); line-height: 1.8; }
      .info-list {
        margin: 12px 0 0;
        padding-left: 18px;
        color: var(--text-sub);
        line-height: 1.9;
      }
      .btn {
        margin-top: 14px;
        display: inline-block;
        text-decoration: none;
        border: 1px solid var(--primary);
        color: #fff;
        background: var(--primary);
        border-radius: 10px;
        padding: 10px 14px;
      }
      @media (max-width: 900px) {
        .layout { grid-template-columns: 1fr; }
      }
      @media (max-width: 800px) {
        .topbar-inner {
          height: auto;
          padding: 10px 0;
          gap: 8px;
          flex-direction: column;
          align-items: flex-start;
        }
      }
    </style>
  </head>
  <body>
    <header class="topbar">
      <div class="container topbar-inner">
        <div class="brand">Jiale · Web</div>
        <nav class="nav">
          <a href="./index.html">首页</a>
          <a href="./about.html">关于</a>
          <a href="./projects.html">项目</a>
          <a class="active" href="./contact.html">联系</a>
        </nav>
      </div>
    </header>

    <main class="container main">
      <section class="layout">
        <article class="card">
          <h1>联系我</h1>
          <p>如果你想合作开发网页、优化前端体验，或者一起做一个小项目，可以通过以下方式联系我。</p>
          <ul class="info-list">
            <li>GitHub: https://github.com/jiale-ly</li>
            <li>Email: your-email@example.com</li>
            <li>Location: China</li>
          </ul>
          <a class="btn" href="mailto:your-email@example.com">发送邮件</a>
        </article>

        <article class="card">
          <h2>建议沟通内容</h2>
          <ul class="info-list">
            <li>你的项目目标与上线时间</li>
            <li>目前已有的页面或设计稿</li>
            <li>希望实现的交互效果和技术栈</li>
          </ul>
        </article>
      </section>
    </main>
  </body>
</html>
